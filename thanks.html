<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Elevate Basketball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏀</text></svg>">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="tracking.js"></script>
  <script>
    // Track form completion when they land on thanks page
    window.addEventListener('load', function() {
      if (window.trackConversion) {
        trackConversion('form_complete', {page: 'thanks'});
      }
    });
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: bounce 0.6s ease-out;
    }

    @keyframes bounce {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #f97316;
    }

    p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #f97316;
      color: #000;
    }

    .btn-primary:hover {
      background: #ea580c;
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 48px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏀</div>
    <h1>Message <span class="highlight">Received!</span></h1>
    <p>Thanks for reaching out! Coach Liam will get back to you soon to discuss training sessions and help your player elevate their game.</p>
    <a href="https://elevate-bb.com" class="btn btn-primary">Back to Home</a>
    <p class="footer-text">Elevate Basketball · Portland, OR</p>
  </div>
</body>
</html>
